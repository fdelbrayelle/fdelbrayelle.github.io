              <li>Methodology: Agile (Scrum - 2-week sprints - SAFe with monthly PI planning)</li>
              <li>Team: +/- 10 people</li>
              <li>Scale: Hundreds of thousands of products indexed each day - <a href="https://www.groupegalerieslafayette.fr/groupe" title="Galeries Lafayette Group" target="_blank" rel="noreferrer noopener">60 million visitors across 290 stores and e-commerce sites each year</a></li>
            </ul>
          </p>
