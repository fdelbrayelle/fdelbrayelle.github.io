  Since 2019, I have also been an <strong>open-source contributor</strong> by participating in the development of <a title="Java Hipster" href="https://www.jhipster.tech" target="_blank" rel="noreferrer noopener">JHipster</a> where I am stream leader on the associated <a title="Kafka generation module for JHipster" href="https://github.com/fdelbrayelle/generator-jhipster-kafka" target="_blank" rel="noreferrer noopener">Kafka generation module</a> (consumers/producers...).

