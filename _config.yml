              <li>Technical migration of the Vue 2 (legacy) project list to Vue 3 / Nuxt 3</li>
              <li>Redesign of the <a href="https://help.malt.com/kb/guide/fr/les-offres-et-frais-de-service-malt-HSSbMl3qrl/Steps/2689803" title="Malt service offers and fees" target="_blank">new service level system</a> and implementation of a blocking system to prevent <em>by-pass</em> (profile view counter for logged-in users, requirement to create an account and log in to view a profile, removal of information that could be used to find a freelancer outside the site...)</li>
              <li>Design of an <a href="https://www.malt.fr/c/product-release" title="AI Search" target="_blank">advanced search partly based on generative AI</a></li>
              <li><em>Proof of concept</em> built during an AI hackathon to find freelancers whose portfolio contains images matching a text or image search (<em>text to image</em>, <em>image to image</em>) using Vertex AI and QDrant (vector database)</li>
