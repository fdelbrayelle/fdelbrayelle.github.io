              <li>Use of e-commerce tools: <a href="https://www.mirakl.fr/" title="Mirakl" target="_blank" rel="noreferrer noopener">Mirakl</a> (marketplace), <a href="https://www.stibosystems.com/fr/solution/step-mdm-platform" title="STEP" target="_blank" rel="noreferrer noopener">STEP</a> (PIM) (<em>Master Data Management</em>), <a href="https://attraqt.gitbook.io/developer-documentation/collect-online-users-activities/tracking-plans/fhr-complete" title="Fredhopper (FHR)" target="_blank" rel="noreferrer noopener">Fredhopper</a> (catalog pages and facets), <a href="https://www.grand-shooting.com/fr/" title="Grand Shooting" target="_blank" rel="noreferrer noopener">Grand Shooting</a> (<em>asset</em> management), <a href="https://www.target2sell.com/produits/recommend/" title="Target2Sell" target="_blank" rel="noreferrer noopener">Target2Sell</a> (recommendation engine), <a href="https://www.attraqt.com/fr-fr/blog/attraqt-acquiert-eb/" title="Early Birds" target="_blank" rel="noreferrer noopener">Early Birds</a>, <a href="https://www.sap.com/france/acquired-brands/what-is-hybris.html" title="Hybris" target="_blank" rel="noreferrer noopener">Hybris</a> (<em>legacy</em>), <a href="https://www.cloudflare.com/fr-fr/" title="Cloudflare" target="_blank" rel="noreferrer noopener">Cloudflare</a>, <a href="https://www.twicpics.com/fr" title="TwicPics" target="_blank" rel="noreferrer noopener">TwicPics</a>, <a href="https://www.algolia.com/" title="Algolia" target="_blank" rel="noreferrer noopener">Algolia</a> (<em>Site Search</em>), <a href="https://www.ingenico.com/fr/login/ogone/" title="Ogone" target="_blank" rel="noreferrer noopener">Ogone</a> (card PSP), <a href="https://www.odigo.com/" title="Prosodie" target="_blank" rel="noreferrer noopener">Prosodie</a> (gift card PSP), <a href="https://www.braintreepayments.com/" title="Braintree" target="_blank" rel="noreferrer noopener">Braintree</a> (PayPal PSP)...</li>
