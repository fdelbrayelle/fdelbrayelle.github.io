      - layout: left
        title: Kestra
        sub_title: Lead Software Engineer
        caption: Since May 2025
        link: www.kestra.io
        description: | # this will include new lines to allow paragraphs
          <img alt="Kestra logo" src="images/kestra_logo.png" style="width: 300px;" />
          <p style="font-style: italic; margin-top: 25px;">Fully remote</p>
          <p style="font-weight: bold;">Plugins / Integrations Squad</p>
          <p><strong>Context:</strong>
            <ul>
              <li>Functional: Creating workflows for data engineers, platform engineers and software engineers</li>
              <li>Business: Agnostic, event-driven orchestrator for mission-critical workflows — verticals: AI, Data Engineering, Infrastructure</li>
              <li>Methodology: <a href="https://basecamp.com/shapeup" target="_blank" rel="noreferrer noopener">Shape-up</a>, 2-month cycles (minor versions of Kestra core), continuous plugin releases</li>
              <li>Squad of 3; close collaboration with Engineering, Product, Sales, Marketing/GTM, Customer Success, and Direction</li>
              <li>Scale: <a href="https://github.com/kestra-io/kestra" target="_blank" rel="noreferrer noopener">Kestra</a> ~30,000 GitHub stars; 40+ enterprise customers; millions of workflows executed / month</li>
            </ul>
          </p>
          <p><strong>Achievements:</strong>
            <ul>
              <li><strong>Scaled Plugin Ecosystem:</strong> Grew from 600 to <a href="https://kestra.io/plugins" target="_blank" rel="noreferrer noopener">1300+ plugins</a> in 11 months (+117%, doubled in 9 months) across <a href="https://github.com/orgs/kestra-io/repositories?q=plugin" target="_blank" rel="noreferrer noopener">180+ plugin repositories</a> (OSS &amp; EE); <a href="https://github.com/search?q=author%3Afdelbrayelle+org%3Akestra-io&amp;type=pullrequests" target="_blank" rel="noreferrer noopener">7000+ GitHub contributions</a> across the Kestra org; structured squad ownership, priorities, discovery and delivery</li>
              <li><strong>Reliability at Scale:</strong> Improved most used plugins (FS, Debezium, JDBC, Scripts, AWS, GCP, Azure, Serdes, Git, EE Git, EE Kubernetes, Docker, Terraform, Slack, AMQP, MinIO…); reduced Kubernetes EE test suite from 2h15 to 15 min; added/fixed hundreds of tests; introduced daily CI on kestra:develop</li>
              <li><strong>Developer Experience &amp; Release Velocity:</strong> Built plugins-devtools to automate dev, testing, and releases; continuous automated releases across 1300+ plugins; dogfooding Kestra for plugin automation (<a href="https://www.linkedin.com/posts/fdelbrayelle_kestra-opensource-dataengineering-activity-7447888978512498688-bfBr" target="_blank" rel="noreferrer noopener">LinkedIn post</a>, <a href="https://kestra.io/blogs/2026-04-27-how-kestra-ships-plugins" target="_blank" rel="noreferrer noopener">blog post</a>)</li>
              <li><strong>Architecture &amp; Platform:</strong> Co-designed Plugin Metadata &amp; Releases API architecture; drove performance improvements; shipped <a href="https://github.com/kestra-io/plugin-git/pull/177" target="_blank" rel="noreferrer noopener">NamespaceSync</a> &amp; <a href="https://github.com/kestra-io/plugin-git/pull/180" target="_blank" rel="noreferrer noopener">TenantSync</a> for Git Sync (OSS &amp; EE); contribution to Kestra core: <a href="https://github.com/kestra-io/kestra/pull/14174" target="_blank" rel="noreferrer noopener">AI Copilot (Speech-to-Text)</a></li>
              <li><strong>Ecosystem Expansion:</strong> Created plugins from scratch: <a href="https://github.com/kestra-io/plugin-mistral/pull/1" target="_blank" rel="noreferrer noopener">Mistral</a>, <a href="https://github.com/kestra-io/plugin-deepseek/pull/2" target="_blank" rel="noreferrer noopener">Deepseek</a>, <a href="https://github.com/kestra-io/plugin-beam/pull/5" target="_blank" rel="noreferrer noopener">Beam</a>, <a href="https://github.com/kestra-io/plugin-bluesky/pull/3" target="_blank" rel="noreferrer noopener">Bluesky</a>, <a href="https://kestra.io/blogs/control-vmware-with-kestra" target="_blank" rel="noreferrer noopener">VMware EE</a>, SAP EE, 1Password (private repos)</li>
              <li><strong>AI Enablement:</strong> Co-authored AI Coding Agent Guidelines (internal), built Engineering AI Hub (internal); public MCP for plugins &amp; blueprints (<a href="https://kestra.io/blogs/2026-04-30-kestra-mcp-plugins-blueprints" target="_blank" rel="noreferrer noopener">blog post</a>)</li>
              <li><strong>Product &amp; Leadership:</strong> Org-wide scope — main interface between plugin ecosystem and every team (Engineering, Sales, Customer Success, DevRel, Product); structured team: priorities, dashboards, workload split, mentoring, onboarding docs; <a href="https://github.com/search?q=assignee%3Afdelbrayelle+org%3Akestra-io&amp;type=issues" target="_blank" rel="noreferrer noopener">hundreds of issues handled</a> (Hacktoberfest, regular events, Pylon tickets); contributed to hiring 3 engineers; built partnerships (Conapi GmbH, WeScale)</li>
              <li><strong>Evangelism:</strong> Conferences: DevLille 2025 &amp; <a href="https://devlille.fr/talk-page-136143e9-347b-4884-b21c-ef9cd6caab40/" target="_blank" rel="noreferrer noopener">DevLille 2026</a> (talk on Kestra, plugins &amp; AI agents), Belgium JUG Ghent, <a href="https://bigdataldn.com" target="_blank" rel="noreferrer noopener">Big Data London 2025</a>, <a href="https://fdelbrayelle.github.io/meetups/datadayslille2026/en/" target="_blank" rel="noreferrer noopener">Data Days Lille 2026</a>; DevRel: contributed to videos (Python/Go/JS SDK, Gemini/Ollama/OpenAI/Salesforce/VMware plugins), blog posts (<a href="https://kestra.io/blogs/control-vmware-with-kestra" target="_blank" rel="noreferrer noopener">VMware</a>, <a href="https://kestra.io/blogs/infra-automation" target="_blank" rel="noreferrer noopener">infrastructure plugins</a>), LinkedIn posts</li>
            </ul>
          </p>
          <p><strong>Tech stack:</strong> <mark>Java 21+</mark>, <mark>Micronaut</mark>, <mark>Gradle</mark>, <mark>Vue 3</mark>, <mark>Nuxt 3</mark>, <mark>Kafka</mark>, <mark>ElasticSearch</mark>, <mark>Kubernetes</mark>, <mark>Docker</mark>, <mark>Google Cloud Platform</mark>, <mark>PostgreSQL</mark>, <mark>git</mark>, <mark>GitHub Actions</mark>, <mark>ArgoCD</mark>, <mark>Terraform</mark>, <mark>Elasticsearch Logstash Kibana</mark>, <mark>Grafana</mark></p>
          <hr style="margin: 25px 0; clear: left;" />

