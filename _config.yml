about_content: | # this will include new lines to allow paragraphs
  I can take on roles as <strong>full-stack developer</strong>, <strong>tech lead</strong> and <strong>solutions architect</strong>. I have also regularly given training on the Spring ecosystem and other technologies. I also try to apply <em>software craftsmanship</em> in my daily work. I have been passionate about development since the 90s and have more than <strong>15 years of experience</strong> since the Computer Science degree I completed in Lens and the Master’s degree in Computer Science at SUPINFO Lille. Of <a title="Myers-Briggs personality test" href="https://www.16personalities.com/fr/la-personnalite-infj" target="_blank" rel="noreferrer noopener">INFJ personality</a>, I am particularly sensitive to means of expression such as <a title="Nonviolent Communication" href="https://fr.wikipedia.org/wiki/Communication_non_violente" target="_blank" rel="noreferrer noopener">NVC (Nonviolent Communication)</a>.

  Since 2022, I have been part of the scale-up and startup world, starting with Malt — a fast-growing European freelance marketplace where I worked on high-impact product development. Today at Kestra, I lead the entire plugin ecosystem in a high-growth, open-source context.

  My job has changed dramatically since 2022, and even more so since 2025 with the rise of agentic AI. Today I write at most 5% of my code myself. I believe my value lies elsewhere: <em>Product Thinking</em>, software architecture, code review, and above all agentic orchestration and inference economics. That's why I built <a href="https://github.com/fdelbrayelle/ai-watchtower" target="_blank" rel="noreferrer noopener">AI Watchtower</a> — a tool to fuel my tech watch and consolidate everything that goes beyond code generation.

  Before that, I worked for several IT service companies for 11 years, in service centers, on-site, in different contexts and organizational modes, for varying durations and in diverse functional domains (<em>Data Asset Management</em>, <em>Product Information Management</em>, SEO, <em>merchandising</em>, sales/e-commerce sport/DIY/luxury/fashion, healthcare, banking and insurance). Since 2018, <strong>I have regularly been working remotely</strong> and this accelerated in March 2020 with the COVID-19 health crisis with several months of fully remote work, which allowed me to change my habits and adapt to be efficient and productive in the best conditions.

  I am primarily back-end oriented but for several years I have also been interested in <em>front-end</em> development (be it Angular, React or Vue). I am a daily user of <mark>GNU/Linux</mark> and I try to have broad knowledge while deepening my expertise in certain domains (<em>"T-shaped"</em>).

  My main areas of expertise span both <em>back-end</em> and <em>front-end</em> with the <mark>Java EE</mark>, <mark>Spring</mark>, <mark>Kafka</mark>, <mark>Angular</mark>, <mark>React</mark> and <mark>Vue</mark> ecosystem. I am able to implement different types of architecture for <em>cloud native</em> applications in a micro-services context.

  I strongly identify with the notion of <a title="From architect to Meta-architect: a necessary evolution (Rémi Cocula @ Devoxx 2019)" href="https://www.youtube.com/watch?v=sEK68arLUq0" target="_blank" rel="noreferrer noopener">"meta-architect"</a> and I constantly question my knowledge: "You know everything when you know that you know nothing" as Socrates said. I do <strong>technology watch</strong> almost daily, trying to keep up with new developments, test certain frameworks and attend <em>meetups</em> <a title="Notes taken at meetups" href="https://francois-delbrayelle.fr/meetups" target="_blank" rel="noreferrer noopener">(see my notes)</a>. I am constantly searching for balance, an <em><a title="Reason for being in Japanese" href="https://fr.wikipedia.org/wiki/Ikigai" target="_blank" rel="noreferrer noopener">ikigai</a></em>. It is important to me to participate in projects that are useful to the general interest.

  I am looking to deepen my skills particularly in <mark>architecture</mark> and <mark>DDD</mark> but also in the <mark>Kotlin</mark>, <mark>Go</mark> and <mark>Rust</mark> languages. I also want to expand my expertise on <em>cloud providers</em> (particularly <mark>GCP</mark> and <mark>AWS</mark> but also on French providers such as <mark>Clever Cloud</mark>). Finally, I remain curious about topics that will be pillars in the near future: <mark>blockchain</mark>, <mark>machine learning</mark>, <mark>deep learning</mark>, <mark>edge computing</mark> and <mark>IoT</mark>.

  <strong>Certifications I have obtained:</strong>

  - [GCP Professional Cloud Architect](https://cloud.google.com/certification/cloud-architect) ([Credential](https://www.credential.net/5aa5d083-f600-4b98-b51b-5771a7ad5878?key=91213c5cc024a76c2b2c6b7746f8e17bcedc825c2014f7806da6d40d68593d76))
  - [GCP Associate Cloud Engineer](https://cloud.google.com/certification/cloud-engineer) ([Credential](https://www.credential.net/0174e9d2-01e0-4a0f-ba14-09e422afbb8b?key=8f5de6e92912aa8a99a313d766af4a279615f0f3acd4ea48c23189c2765aa41e))

  <p style="text-align: center;">
    <img src="images/gcp-associate-cloud-engineer.png" alt="Associate Cloud Engineer" style="width: 220px" />
    <img src="images/gcp-professional-cloud-architect.png" alt="Professional Cloud Architect" style="width: 220px" />
  </p>

