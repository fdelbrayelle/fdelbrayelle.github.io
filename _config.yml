        description: | # this will include new lines to allow paragraphs
          <img alt="Ippon Technologies logo" src="images/ippon_new_logo.png" style="width: 300px; margin-bottom: 25px;" />
          <p>
            <h4>Knowledge sharing:</h4>
            <br />
            <p>
              <strong>🧑‍🏫 Training delivered:</strong>
              <ul>
                <li>Spring Expert (Core, Hibernate, JPA, Boot, Data, Batch, Web MVC, Security, Integration...) over multiple 3-day sessions internally at Ippon and for clients (Brittany Ferries). Improvement and redesign of the training materials (<em>slides</em> and exercises) as a team.</li>
