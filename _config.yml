                  <li>Support as technical contact with various teams and stakeholders: front, BFF, seller portal app, checkout app, <em>legacy</em> apps and ops</li>
                  <li>Close collaboration with PO and SM</li>
                  <li>Architecture workshops and writing of RICEFW (<em>Reports, Interface, Conversion, Enhancements, Forms, and Workflows</em>), IFS (<em>InterFace Specifications</em>) and NFR (<em>Non Functional Requirements</em>) to support the implementation of SAP Commerce Cloud (<em>replatforming</em>)</li>
