          <h4>Galeries Lafayette - Février 2021 à Septembre 2022 (20 mois)</h4>
          <img alt="Logo des Galeries Lafayette" src="/images/gl_logo.png" style="float: right; width: 250px; margin: 25px;" />
          <p style="font-style: italic; margin-top: 25px;">Télétravail intégral</p>
          <p style="font-weight: bold;">Services / APIs multi-canaux (e-commerce, mobile...)</p>
          <p><strong>Contexte :</strong>
            <ul>
              <li>Fonctionnel : Vente / E-Commerce</li>
              <li>Business : PIM et tunnel de commandes. Refonte du <a title="Galeries Lafayette" href="https://www.galerieslafayette.com/" target="_blank" rel="noreferrer noopener">site e-commerce des Galeries Lafayette</a> (B2C) dans le cadre du programme accélérateur NewGL pour décommissionner le <em>legacy</em> et unifier les fiches produits avec STEP pour outil central du PIM. Services et APIs pour le SI GL (e-commerce, portail vendeur en magasin, encaissement, application mobile).</li>
              <li>Méthodologique : Agile (Scrum - Sprints de 2 semaines - SAFe avec PI plannings mensuels)</li>
              <li>Équipe : +/- 10 personnes</li>
              <li>Volumétrie : Centaines de milliers de produits indexés chaque jour - <a href="https://www.groupegalerieslafayette.fr/groupe" title="Groupe Galeries Lafayette" target="_blank" rel="noreferrer noopener">60 millions de visiteurs dans 290 magasins et sur ses sites e-commerce chaque année</a></li>
            </ul>
          </p>
          <p><strong>Réalisations :</strong>
            <ul>
              <li><strong>Architecture et leading technique</strong> :
                <ul>
                  <li><em>Tech lead</em> transverse sur le <em>Product Information Management</em> (PIM) et le tunnel de commandes</li>
                  <li>Création et modification de micro-services avec approche <em>design first</em> (OpenAPI) et en architecture hexagonale pour l'implémentation</li>
                  <li>Conception de diagrammes UML : composants (cartographie du périmètre), cas d'utilisations et de séquences</li>
                  <li>Maintien d'un partage de connaissances avancé (capitalisation/documentation/impacts sur Confluence)</li>
                  <li>Rédaction d'<a href="https://adr.github.io/" title="architectural decision records" target="_blank" rel="noreferrer noopener">ADR</a> (<em>architectural decision records</em>) pour tracer les échanges</li>
                  <li>Animation d'ateliers techniques et de points dévs avec l'équipe et d'autres parties prenantes (ops, ...)</li>
                  <li>Points de synchronisation avec les <em>tech leads</em> des autres équipes</li>
                  <li>Relance de la communauté des développeurs NewGL</li>
                  <li>Support en tant qu'interlocuteur technique avec les différentes équipes et acteurs : front, BFF, application du portail vendeur, application d'encaissement, applications <em>legacy</em> et ops</li>
                  <li>Collaboration rapprochée avec PO et SM</li>
                  <li>Ateliers d'architecture et rédaction de RICEFW (<em>Reports, Interface, Conversion, Enhancements, Forms, and Workflows</em>), IFS (<em>InterFace Specifications</em>) et NFR (<em>Non Functional Requirements</em>) pour accompagner la mise en place de SAP Commerce Cloud (<em>replatforming</em>)</li>
                  <li><em>On-boarding</em> des nouveaux arrivants (documentation spécifique, accompagnement, <em>pair/mob-programming</em>...)</li>
                </ul>
              </li>
              <li><em>Software craftsmanship</em> : revue de code, <em>Test-Driven Development</em> (<mark>TDD</mark>), <em>Behavior-Driven Development</em> (<mark>BDD</mark>), <mark>pair-programming</mark> (avec développeurs, <em>cloud engineers</em>), <mark>mob-programming</mark>, CI/CD, mocks, ...</li>
              <li>Amélioration continue de la qualité des développements (suivi Sonar)</li>
              <li>Études, développement et tests : réalisation d'évolutions et correctifs sur les APIs et briques du périmètre (Offer, Merch, Product, Asset, Cart, Delivery, Payment, Customer, ...)</li>
              <li>Mission 100 % <em>back-end</em> autour d'une vingtaine de microservices (RESTful APIs) mais avec nécessité d'aller parfois comprendre le code des BFFs (Apollo Server GraphQL), du front (en Vue 3 et GraphQL) ou de librairies Jenkins (en Groovy)</li>
              <li>Rôle de <em>scrum master</em> pour animer notamment l'équipe sur les rituels Scrum (<em>daily</em>, rétrospectives, ...)</li>
              <li>Promotion de pratiques agiles et DevOps au sein de l'équipe et en relation avec les autres</li>
              <li>Utilisation de Kafka en <em>backbone</em> pour communiquer entre les différentes briques</li>
              <li>Utilisation de Webhooks pour les Incoming Webhooks Slack et la mise à jour des prix et stocks pour les offres marketplace depuis Mirakl</li>
              <li>Utilisation d'outils relatifs au e-commerce : <a href="https://www.mirakl.fr/" title="Mirakl" target="_blank" rel="noreferrer noopener">Mirakl</a> (marketplace), <a href="https://www.stibosystems.com/fr/solution/step-mdm-platform" title="STEP" target="_blank" rel="noreferrer noopener">STEP</a> (PIM) (<em>Master Data Management</em>), <a href="https://attraqt.gitbook.io/developer-documentation/collect-online-users-activities/tracking-plans/fhr-complete" title="Fredhopper (FHR)" target="_blank" rel="noreferrer noopener">Fredhopper</a> (pages catalogues et facettes), <a href="https://www.grand-shooting.com/fr/" title="Grand Shooting" target="_blank" rel="noreferrer noopener">Grand Shooting</a> (gestion des <em>assets</em>), <a href="https://www.target2sell.com/produits/recommend/" title="Target2Sell" target="_blank" rel="noreferrer noopener">Target2Sell</a> (moteur de recommandations), <a href="https://www.attraqt.com/fr-fr/blog/attraqt-acquiert-eb/" title="Early Birds" target="_blank" rel="noreferrer noopener">Early Birds</a>, <a href="https://www.sap.com/france/acquired-brands/what-is-hybris.html" title="Hybris" target="_blank" rel="noreferrer noopener">Hybris</a> (<em>legacy</em>), <a href="https://www.cloudflare.com/fr-fr/" title="Cloudflare" target="_blank" rel="noreferrer noopener">Cloudflare</a>, <a href="https://www.twicpics.com/fr" title="TwicPics" target="_blank" rel="noreferrer noopener">TwicPics</a>, <a href="https://www.algolia.com/" title="Algolia" target="_blank" rel="noreferrer noopener">Algolia</a> (<em>Site Search</em>), <a href="https://www.ingenico.com/fr/login/ogone/" title="Ogone" target="_blank" rel="noreferrer noopener">Ogone</a> (PSP cartes), <a href="https://www.odigo.com/" title="Prosodie" target="_blank" rel="noreferrer noopener">Prosodie</a> (PSP cartes cadeaux), <a href="https://www.braintreepayments.com/" title="Braintree" target="_blank" rel="noreferrer noopener">Braintree</a> (PSP PayPal)...</li>
              <li>Organisation 100 % <em>full remote</em> (Slack, Mural, Google Meet, <a href="https://plugins.jetbrains.com/plugin/14896-code-with-me" title="Plugin Code With Me pour IntelliJ" target="_blank" rel="noreferrer noopener">IntelliJ Code With Me</a>, ...) sur l'ensemble de la mission</li>
            </ul>
          </p>
          <p><strong>Environnement :</strong> <mark>Java 12 et 17</mark>, <mark>Kotlin</mark>, <mark>Python</mark>, <mark>Groovy</mark>, <mark>Micro-services</mark>, <mark>Architecture hexagonale</mark>, <mark>Spring Boot</mark>, <mark>Cucumber</mark>, <mark>Open API</mark>, <mark>PlantUML</mark>, <mark>Kafka</mark>, <mark>Kafka Streams</mark>, <mark>Kafka Connect</mark>, <mark>Aiven</mark>, <mark>Kubernetes</mark>, <mark>Docker</mark>, <mark>Arrow</mark>, <mark>MockK</mark>, <mark>vavr</mark>, <mark>Google Cloud Platform (Kubernetes Engine, Cloud SQL, Memorystore, Cloud Storage, Cloud Functions, BigQuery, ...)</mark>, <mark>Testcontainers</mark>, <mark>Cerberus</mark>, <mark>Karate</mark>, <mark>PostgreSQL</mark>, <mark>Redis</mark>, <mark>GraphQL</mark>, <mark>Webhooks</mark>, <mark>Keycloak</mark>, <mark>git</mark>, <mark>Bitbucket</mark>, <mark>Jenkins</mark>, <mark>ArgoCD</mark>, <mark>Terraform</mark>, <mark>Dynatrace</mark>, <mark>Elasticsearch Logstash Kibana</mark>, <mark>Grafana</mark></p>
