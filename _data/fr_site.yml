about_title: À propos
about_profile_image: /images/fdelbrayelle.jpg
about_content: | # this will include new lines to allow paragraphs
  Je peux prendre les rôles de <strong>développeur full-stack</strong>, <strong>tech lead</strong> et <strong>architecte solutions</strong>. J'ai donné régulièrement en complément des formations sur l'écosystème Spring et d'autres technos. Je tente également d'appliquer le <em>software craftsmanship</em> au quotidien dans mon travail. Je me passionne pour le développement depuis les années 90 et j'ai plus de <strong>15 ans d'expérience</strong> depuis le DUT informatique que j'ai effectué à Lens et le master informatique à SUPINFO Lille. De <a title="Test de Myers-Briggs" href="https://www.16personalities.com/fr/la-personnalite-infj" target="_blank" rel="noreferrer noopener">personnalité INFJ</a>, je suis particulièrement sensible aux moyens d'expression tels que la <a title="Communication non violente" href="https://en.wikipedia.org/wiki/Nonviolent_communication" target="_blank" rel="noreferrer noopener">CNV</a>.

  À partir de 2022, j'ai rejoint le monde des scale-ups et start-ups, à commencer par Malt — une marketplace européenne pour freelances en pleine croissance, où j'ai participé à des développements à fort impact. Et aujourd'hui Kestra, où j'ai en charge tout l'écosystème des plugins, dans un contexte à forte croissance.

  Mon métier a fortement changé depuis 2022, et surtout depuis 2025 avec l'essor de l'IA agentique. Aujourd'hui, j'écris au maximum 5 % de mon code moi-même. Je pense que ma valeur réside désormais ailleurs : <em>Product Thinking</em>, architecture logicielle, revue de code, et surtout orchestration agentique et économie de l'inférence. C'est pour cela que j'ai construit <a href="https://github.com/fdelbrayelle/ai-watchtower" target="_blank" rel="noreferrer noopener">AI Watchtower</a> — un outil pour ma veille technologique et consolider mes acquis dans tout ce qui n'est pas de la génération de code.

  Avant cela, j'ai travaillé pour plusieurs ESN pendant 11 ans, en centre de services, en régie, dans différents contextes et modes d'organisation, pour des durées variées et dans divers domaines fonctionnels (<em>Data Asset Management</em>, <em>Product Information Management</em>, référencement/SEO, <em>merchandising</em>, vente/e-commerce sport/bricolage/luxe/prêt-à-porter, santé, banque et assurance). Depuis 2018, <strong>je suis régulièrement en télétravail</strong> et cela s'est accéléré en mars 2020 avec la crise sanitaire de la COVID-19 avec plusieurs mois en télétravail intégral ce qui m'a permis de changer mes habitudes et m'adapter pour être efficace et productif dans les meilleures conditions.

  Je suis plutôt orienté développement <em>back-end</em> à la base mais depuis quelques années je m'intéresse également au <em>front-end</em> (que ce soit à Angular, React ou Vue). Je suis utilisateur au quotidien de <mark>GNU/Linux</mark> et je tente d'avoir des connaissances larges tout en approfondissant mon expertise dans certains domaines (<em>"T-shaped"</em>).

  Ces domaines d'expertise principaux sont à la fois <em>back-end</em> et <em>front-end</em> avec l'écosystème <mark>Java EE</mark>, <mark>Spring</mark>, <mark>Kafka</mark>, <mark>Angular</mark>, <mark>React</mark> et <mark>Vue</mark>. Je suis capable de mettre en place différents types d'architecture pour des applications <em>cloud native</em> dans un contexte micro-services.

  Je me retrouve beaucoup dans la notion de <a title="D'architecte à Métarchitecte : une évolution nécessaire (Rémi Cocula @ Devoxx 2019)" href="https://www.youtube.com/watch?v=sEK68arLUq0" target="_blank" rel="noreferrer noopener">"métarchitecte"</a> et je remets constamment mes connaissances en question : "Tu sais tout quand tu sais que tu ne sais rien" disait Socrate. Je suis en <strong>veille techno</strong> quasi quotidienne en essayant de m'intéresser aux nouveautés, tester certains frameworks et participer à des <em>meetups</em> <a title="Restitution des notes prises en meetups" href="https://francois-delbrayelle.fr/meetups" target="_blank" rel="noreferrer noopener">(voir mes notes)</a>. Je suis en recherche constante d'un équilibre, d'un <em><a title="Raison d'être en japonais" href="https://en.wikipedia.org/wiki/Ikigai" target="_blank" rel="noreferrer noopener">ikigai</a></em>. C'est important pour moi de participer à des projets ayant une utilité pour l'intérêt général.

  Je cherche à approfondir mes compétences en particulier dans en <mark>architecture</mark> et <mark>DDD</mark> mais également dans les langages <mark>Kotlin</mark>, <mark>Go</mark> et <mark>Rust</mark>. Je souhaite aussi compléter mon savoir-faire sur les <em>cloud providers</em> (en particulier <mark>GCP</mark> et <mark>AWS</mark> mais également sur les fournisseurs français tels que <mark>Clever Cloud</mark>). Enfin je reste curieux sur les sujets qui constitueront des piliers dans un avenir proche : <mark>blockchain</mark>, <mark>machine learning</mark>, <mark>deep learning</mark>, <mark>edge computing</mark> et <mark>IoT</mark>.

  <strong>Les certifications que j'ai passées :</strong>

  - [GCP Professional Cloud Architect](https://cloud.google.com/certification/cloud-architect) ([Credential](https://www.credential.net/5aa5d083-f600-4b98-b51b-5771a7ad5878?key=91213c5cc024a76c2b2c6b7746f8e17bcedc825c2014f7806da6d40d68593d76))
  - [GCP Associate Cloud Engineer](https://cloud.google.com/certification/cloud-engineer) ([Credential](https://www.credential.net/0174e9d2-01e0-4a0f-ba14-09e422afbb8b?key=8f5de6e92912aa8a99a313d766af4a279615f0f3acd4ea48c23189c2765aa41e))

  <p style="text-align: center;">
    <img src="/images/gcp-associate-cloud-engineer.png" alt="Associate Cloud Engineer" style="width: 220px" />
    <img src="/images/gcp-professional-cloud-architect.png" alt="Professional Cloud Architect" style="width: 220px" />
  </p>

  <strong>Les <em>talks</em> que j'ai donnés :</strong>

  - [RGPD pour les développeurs](https://github.com/fdelbrayelle/talk-gdpr-for-developers)
  - [REST, gRPC, GraphQL, Webhooks : dans quelles situations ?](https://github.com/fdelbrayelle/talk-rest-grpc-graphql-webhooks)
  - [Micronaut et Quarkus](https://github.com/fdelbrayelle/midi-tech-micronaut-quarkus)
  - [Kubernetes](https://github.com/fdelbrayelle/midi-tech-k8s)
  - [Vue.js](https://github.com/fdelbrayelle/midi-tech-vuejs)
  - [JHipster](https://github.com/fdelbrayelle/midi-tech-jhipster)
  - [L'après Java 8](https://github.com/fdelbrayelle/midi-tech-java-news)

  <strong>Les livres que j'ai lus :</strong>
  - "Learning Domain-Driven Design" de Vlad Khononov
  - "Functional Programming in Kotlin" de Marco Vermeulen, Rúnar Bjarnason et Paul Chiusano
  - "Fundamentals of Data Engineering" de Joe Reis et Matt Housley
  - "Staff Engineer" de Will Larson
  - "Software Craft" de Cyrille Martraire, Arnaud Thiéfaine, Dorra Bartaguiz, Fabien Hiegel, Houssam Fakih
  - "Clean Architecture" de Robert C. Martin
  - "Domain-Driven Design: Tackling Complexity in the Heart of Software" de Eric Evans
  - "Official Google Cloud Certified Professional Cloud Architect Study Guide" de Dan Sullivan
  - "Official Google Cloud Certified Associate Cloud Engineer Study Guide" de Dan Sullivan
  - "Kafka: The Definitive Guide" de Neha Narkhede, Gwen Shapira et Todd Palino
  - "Deep Learning avec TensorFlow" de Aurélien Géron
  - "Machine Learning avec Scikit-Learn" de Aurélien Géron
  - "Kubernetes - Maîtrisez l'orchestrateur des infrastructures du futur" de Kelsey Hightower, Brendan Burns, Joe Beda
  - "Docker - Pratique des architectures à base de conteneurs" de Pierre-Yves Cloux, Thomas Garlot et Johann Kohler
  - "Design patterns pour Java" de Laurent Debrauwer
  - "Java Spring - Le socle technique des applications Java EE" de Hervé Le Morvan
  - "Clean Code: A Handbook of Agile Software Craftsmanship" de Robert C. Martin
  - "SCJP Sun Certified Programmer for Java 6 Study Guide: Exam 310-065" de Katherine Sierra et Bert Bates
  - "Réussir son référencement web" de Olivier Andrieux
  - "Améliorer la qualité des services: Avec la Gestion des Problèmes ITIL" de Hamilton Mann
  - "Métier : Développeur" de Jean-Christophe Arnulfo
  - "Linux : Programmation système et réseau" (2ème édition) de Joëlle Delacroix
  - "Introduction aux scripts shell" de Arnold Robbins et Nelson-H-F Beebe

  Depuis 2019, je suis également <strong>contributeur open-source</strong> en participant au développement de <a title="Java Hipster" href="https://www.jhipster.tech" target="_blank" rel="noreferrer noopener">JHipster</a> où je suis stream leader sur le <a title="Module de génération Kafka pour JHipster" href="https://github.com/fdelbrayelle/generator-jhipster-kafka" target="_blank" rel="noreferrer noopener">module de génération Kafka</a> (consumers/producers...) associé.

content:
  - title: Expérience
    layout: list
    content:
      - layout: left
        title: Kestra
        sub_title: Lead Software Engineer
        caption: Depuis Mai 2025
        link: www.kestra.io
        description: | # this will include new lines to allow paragraphs
          <img alt="Logo de Kestra" src="/images/kestra_logo.png" style="width: 300px;" />
          <p style="font-style: italic; margin-top: 25px;">Télétravail intégral</p>
          <p style="font-weight: bold;">Équipe Plugins / Intégrations</p>
          <p><strong>Contexte :</strong>
            <ul>
              <li>Fonctionnel : Création de workflows pour les data engineers, platform engineers et software engineers</li>
              <li>Business : Orchestrateur agnostique et event-driven pour les workflows mission-critical — verticales : IA, Data Engineering, Infrastructure</li>
              <li>Méthodologique : <a href="https://basecamp.com/shapeup" target="_blank" rel="noreferrer noopener">Shape-up</a>, cycles de 2 mois (versions mineures de Kestra core), releases continues des plugins</li>
              <li>Squad de 3 personnes ; collaboration étroite avec Engineering, Product, Sales, Marketing/GTM, Customer Success et Direction</li>
              <li>Volumétrie : <a href="https://github.com/kestra-io/kestra" target="_blank" rel="noreferrer noopener">Kestra</a> ~30 000 étoiles GitHub ; 40+ entreprises clientes ; millions de workflows exécutés / mois</li>
            </ul>
          </p>
          <p><strong>Réalisations :</strong>
            <ul>
              <li><strong>Écosystème de plugins en croissance :</strong> Croissance de 600 à <a href="https://kestra.io/plugins" target="_blank" rel="noreferrer noopener">1300+ plugins</a> en 11 mois (+117%, doublé en 9 mois) sur <a href="https://github.com/orgs/kestra-io/repositories?q=plugin" target="_blank" rel="noreferrer noopener">170+ repositories</a> (OSS &amp; EE) ; <a href="https://github.com/search?q=author%3Afdelbrayelle+org%3Akestra-io&amp;type=pullrequests" target="_blank" rel="noreferrer noopener">7000+ contributions sur GitHub</a> ; structuration de l'ownership, des priorités, de la discovery et de la delivery</li>
              <li><strong>Fiabilité à l'échelle :</strong> Amélioration des plugins les plus utilisés (FS, Debezium, JDBC, Scripts, AWS, GCP, Azure, Serdes, Git, EE Git, EE Kubernetes, Docker, Terraform, Slack, AMQP, MinIO…) ; réduction de la suite de tests Kubernetes EE de 2h15 à 15 min ; ajout et correction de centaines de tests ; CI quotidienne sur kestra:develop</li>
              <li><strong>Expérience développeur &amp; vélocité des releases :</strong> Construction de plugins-devtools pour automatiser le développement, les tests et les releases ; releases continues automatisées sur 1300+ plugins ; dogfooding de Kestra pour l'automatisation des plugins (<a href="https://www.linkedin.com/posts/fdelbrayelle_kestra-opensource-dataengineering-activity-7447888978512498688-bfBr" target="_blank" rel="noreferrer noopener">post LinkedIn</a>, <a href="https://kestra.io/blogs/2026-04-27-how-kestra-ships-plugins" target="_blank" rel="noreferrer noopener">article de blog</a>)</li>
              <li><strong>Architecture &amp; Plateforme :</strong> Co-conception de l'architecture de l'API Plugin Metadata &amp; Releases ; amélioration des performances ; implémentation de <a href="https://github.com/kestra-io/plugin-git/pull/177" target="_blank" rel="noreferrer noopener">NamespaceSync</a> &amp; <a href="https://github.com/kestra-io/plugin-git/pull/180" target="_blank" rel="noreferrer noopener">TenantSync</a> pour le Git Sync (OSS &amp; EE) ; contribution au cœur de Kestra : <a href="https://github.com/kestra-io/kestra/pull/14174" target="_blank" rel="noreferrer noopener">AI Copilot (Speech-to-Text)</a></li>
              <li><strong>Expansion de l'écosystème :</strong> Création de plugins from scratch : <a href="https://github.com/kestra-io/plugin-mistral/pull/1" target="_blank" rel="noreferrer noopener">Mistral</a>, <a href="https://github.com/kestra-io/plugin-deepseek/pull/2" target="_blank" rel="noreferrer noopener">Deepseek</a>, <a href="https://github.com/kestra-io/plugin-beam/pull/5" target="_blank" rel="noreferrer noopener">Beam</a>, <a href="https://github.com/kestra-io/plugin-bluesky/pull/3" target="_blank" rel="noreferrer noopener">Bluesky</a>, <a href="https://kestra.io/blogs/control-vmware-with-kestra" target="_blank" rel="noreferrer noopener">VMware EE</a>, SAP EE, 1Password (repos privés)</li>
              <li><strong>Adoption IA :</strong> Co-rédaction des AI Coding Agent Guidelines (interne), création de l'Engineering AI Hub (interne) ; MCP public pour plugins &amp; blueprints (<a href="https://kestra.io/blogs/2026-04-30-kestra-mcp-plugins-blueprints" target="_blank" rel="noreferrer noopener">article de blog</a>)</li>
              <li><strong>Produit &amp; Leadership :</strong> Périmètre transverse — interface principale de l'écosystème plugins avec toutes les équipes (Engineering, Sales, Customer Success, DevRel, Product) ; structuration de l'équipe : priorités, dashboards, répartition, mentoring, onboarding ; <a href="https://github.com/search?q=assignee%3Afdelbrayelle+org%3Akestra-io&amp;type=issues" target="_blank" rel="noreferrer noopener">centaines d'issues traitées</a> (Hacktoberfest, événements, tickets Pylon) ; aide au recrutement (3 ingénieurs) ; partenariats (Conapi GmbH, WeScale)</li>
              <li><strong>Évangélisation :</strong> Conférences : DevLille 2025 &amp; <a href="https://devlille.fr/talk-page-136143e9-347b-4884-b21c-ef9cd6caab40/" target="_blank" rel="noreferrer noopener">DevLille 2026</a> (talk sur Kestra, plugins &amp; agents IA), Belgium JUG Ghent, <a href="https://bigdataldn.com" target="_blank" rel="noreferrer noopener">Big Data London 2025</a>, <a href="https://fdelbrayelle.github.io/meetups/datadayslille2026" target="_blank" rel="noreferrer noopener">Data Days Lille 2026</a> ; DevRel : contribution à des vidéos (SDK Python/Go/JS, plugins Gemini/Ollama/OpenAI/Salesforce/VMware), articles de blog (<a href="https://kestra.io/blogs/control-vmware-with-kestra" target="_blank" rel="noreferrer noopener">VMware</a>, <a href="https://kestra.io/blogs/infra-automation" target="_blank" rel="noreferrer noopener">plugins infra</a>), posts LinkedIn</li>
            </ul>
          </p>
          <p><strong>Environnement :</strong> <mark>Java 21+</mark>, <mark>Micronaut</mark>, <mark>Gradle</mark>, <mark>Vue 3</mark>, <mark>Nuxt 3</mark>, <mark>Kafka</mark>, <mark>ElasticSearch</mark>, <mark>Kubernetes</mark>, <mark>Docker</mark>, <mark>Google Cloud Platform</mark>, <mark>PostgreSQL</mark>, <mark>git</mark>, <mark>GitHub Actions</mark>, <mark>ArgoCD</mark>, <mark>Terraform</mark>, <mark>Elasticsearch Logstash Kibana</mark>, <mark>Grafana</mark></p>
          <hr style="margin: 25px 0; clear: left;" />

      - layout: left
        title: Malt
        sub_title: Lead Software Engineer
        caption: Octobre 2022 - Mai 2025
        link: www.malt.fr
        description: | # this will include new lines to allow paragraphs
          <img alt="Logo de Malt" src="/images/malt-logo.png" style="width: 300px;" />
          <p style="font-style: italic; margin-top: 25px;">Télétravail intégral</p>
          <p style="font-weight: bold;">Tribe Transaction - Squad Project (10 mois)</p>
          <p><strong>Contexte :</strong>
            <ul>
              <li>Fonctionnel : Gestion du suivi des projets / missions entre clients et freelances</li>
              <li>Business : Domaines des devis, projets, dépenses, suivis d'activité, recommandations suite à fin de mission</li>
              <li>Méthodologique : Kanban - No Estimates - Focus / Cool-Down</li>
              <li>Équipe : +/- 10 personnes</li>
              <li>Volumétrie : 700 000+ freelancers - 350 000+ entreprises clientes - 60 000+ projets clients / an</li>
            </ul>
          </p>
          <p><strong>Réalisations :</strong>
            <ul>
              <li>Migration technique importante du domaine des <a href="https://www.youtube.com/watch?v=2ug1T0_ZDyA" target="_blank">devis freelances</a> de JSP/HBS/JS/Vue 2 (legacy) vers Vue 3 / Nuxt 3 + création d'un nouveau domaine et de nouvelles APIs.</li>
              <li>Migration technique du domaine des recommandations freelances par les clients suite à fin de mission de JSP/HBS/JS/Vue 2 (legacy) vers Vue 3 / Nuxt 3 + création d'un nouveau domaine et de nouvelles APIs.</li>
              <li>Animation de l'équipe avec introduction de nouveaux rituels : démo, daily sync, templates JIRA, document de suivi de QA, etc.</li>
            </ul>
          </p>
          <p style="font-style: italic; margin-top: 25px;">Télétravail intégral</p>
          <p style="font-weight: bold;">Tribe Staffing - Squad Matching (21 mois)</p>
          <p><strong>Contexte :</strong>
            <ul>
              <li>Fonctionnel : Applicant Tracking System / Freelancing</li>
              <li>Business : Domaines de la recherche de freelancers et de la création de projets par les entreprises clientes</li>
              <li>Méthodologique : Kanban - No Estimates - Focus / Cool-Down</li>
              <li>Équipe : +/- 10 personnes</li>
              <li>Volumétrie : 700 000+ freelancers - 350 000+ entreprises clientes - 200 000+ recherches / mois</li>
            </ul>
          </p>
          <p><strong>Réalisations :</strong>
            <ul>
              <li>Suite au rachat de Comatch, <a href="https://www.malt.fr/c/maltstrategy/companies?source_component=hero-strategy" title="Malt Strategy" target="_blank">nouveau funnel de projets dédié à une catégorie stratégique de freelancers</a></li>
              <li>Refonte de la gestion de la date de démarrage et de la durée d'un projet / brief</li>
              <li>Migration technique du domaine de la recherche de freelancers de JSP/HBS/JS (legacy) vers Vue 3 / Nuxt 3</li>
              <li>Migration technique de la liste des projets Vue 2 (legacy) vers Vue 3 / Nuxt 3</li>
              <li>Refonte du <a href="https://help.malt.com/kb/guide/fr/les-offres-et-frais-de-service-malt-HSSbMl3qrl/Steps/2689803" title="Offres et frais de service Malt" target="_blank">nouveau système de service level</a> et mise en place d'un système de blocage pour éviter le <em>by-pass</em> (compteur de profils vus pour les utilisateurs connectés, obligation de créer un compte et de se connecter pour consulter un profil, retrait d'informations permettant de retrouver un freelance en dehors du site...)</li>
              <li>Conception d'une <a href="https://www.malt.fr/c/product-release" title="AI Search" target="_blank">recherche avancée basée en partie sur l'IA générative</a></li>
              <li><em>Proof of concept</em> réalisé lors d'un hackathon IA pour trouver des freelances dont le portfolio comporte des images correspondant à une recherche textuelle ou par image (<em>text to image</em>, <em>image to image</em>) via l'utilisation de Vertex AI et de QDrant (base de données vectorielles)</li>
            </ul>
          </p>
          <p><strong>Architecture et leading technique</strong> :
              <ul>
                <li>Maintien d'un partage de connaissances avancé (capitalisation/documentation/impacts sur Notion)</li>
                <li>Rédaction d'<a href="https://adr.github.io/" title="architectural decision records" target="_blank" rel="noreferrer noopener">ADR</a> (<em>architectural decision records</em>) pour tracer les échanges</li>
                <li>Animation d'ateliers techniques et de points dévs avec l'équipe et d'autres parties prenantes (ops, ...)</li>
                <li>Points de synchronisation avec les <em>tech leads</em> des autres squads</li>
                <li>Points de synchronisation inter squads</li>
                <li>Collaboration rapprochée avec Product Manager et Product Designer</li>
                <li><em>On-boarding</em> des nouveaux arrivants (documentation spécifique, accompagnement, <em>pair/mob-programming</em>...)</li>
                <li>Organisation d'<em>event stormings</em> pour délimiter nos domaines</li>
              </ul>
          </p>
          <p>
            <strong><em>Software craftsmanship</em></strong> : revue de code, <em>Test-Driven Development</em> (<mark>TDD</mark>), <mark>pair-programming</mark> (avec développeurs, <em>platform engineers</em>), <mark>mob-programming</mark>, CI/CD, ...
          </p>
          <p>
            <strong>Études, développement et tests</strong> : réalisation d'évolutions et correctifs. Support tournant.
          </p>
          <p style="font-weight: bold;">Back-end, front-end and SRE guilds member</p>
          <p><strong>Environnement :</strong> <mark>Kotlin</mark>, <mark>Java 17+</mark>, <mark>Monorepo</mark>, <mark>Architecture hexagonale</mark>, <mark>CQRS</mark>, <mark>Spring Boot</mark>, <mark>Gradle</mark>, <mark>Vue 3</mark>, <mark>Nuxt 3</mark>, <mark>RabbitMQ</mark>, <mark>Kafka</mark>, <mark>jOOQ</mark>, <mark>Kubernetes</mark>, <mark>Docker</mark>, <mark>Google Cloud Platform (Kubernetes Engine, Memorystore, Cloud Storage, BigQuery, ...)</mark>, <mark>Testcontainers</mark>, <mark>PostgreSQL</mark>, <mark>Mongo</mark>, <mark>Redis</mark>, <mark>Keycloak</mark>, <mark>git</mark>, <mark>GitLab</mark>, <mark>GitLab CI</mark>, <mark>ArgoCD</mark>, <mark>Terraform</mark>, <mark>Datadog</mark>, <mark>Elasticsearch Logstash Kibana</mark>, <mark>Grafana</mark></p>
          <p>
            <strong>🗣️ <em>Talks</em> donnés :</strong>
            <ul>
              <li>Conférence <a title="RGPD pour les développeurs" href="https://devfest.gdglille.org/" target="_blank" rel="noreferrer noopener">"RGPD pour les développeurs"</a> (<a title="Support pour RGPD pour les développeurs" href="https://github.com/fdelbrayelle/talk-gdpr-for-developers" target="_blank" rel="noreferrer noopener">support</a>) aux Malt Tech Days 2023</li>
            </ul>
          </p>
          <p>
            <strong>🌍 Participation (spectateur) à des conférences :</strong>
            <ul>
              <li><a title="DevFest Lille 2024" href="https://devfest.gdglille.org" target="_blank" rel="noreferrer noopener">DevFest Lille</a> 2024</li>
              <li><a title="DevFest Lille 2023" href="https://devfest.gdglille.org" target="_blank" rel="noreferrer noopener">DevFest Lille</a> 2023</li>
              <li><a title="Devoxx 2023" href="https://www.devoxx.fr/" target="_blank" rel="noreferrer noopener">Devoxx</a> 2023</li>
            </ul>
          </p>
          <hr style="margin: 25px 0; clear: left;" />

      - layout: left
        title: Ippon Technologies
        sub_title: Lead Software Engineer
        caption: Octobre 2019 - Septembre 2022
        link: fr.ippon.tech
        description: | # this will include new lines to allow paragraphs
          <img alt="Logo de Ippon Technologies" src="/images/ippon_new_logo.png" style="width: 300px; margin-bottom: 25px;" />
          <p>
            <h4>Capitalisation :</h4>
            <br />
            <p>
              <strong>🧑‍🏫 Formations données :</strong>
              <ul>
                <li>Expert Spring (Core, Hibernate, JPA, Boot, Data, Batch, Web MVC, Security, Integration...) sur plusieurs sessions de 3 jours en interne Ippon et pour des clients (Brittany Ferries). Amélioration et refonte du support de formation (<em>slides</em> et exercices) en équipe.</li>
              </ul>
            </p>
            <p>
              <strong>👨‍🎓 Formations reçues :</strong>
